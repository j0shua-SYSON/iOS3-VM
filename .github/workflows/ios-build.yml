name: ios-build

# Builds the iOS app on a macOS runner (free + unlimited minutes on public
# repos), fake-signs it with ldid — no Apple Developer account required — and
# uploads an installable .ipa artifact for a jailbroken device.
on:
  push:
    paths:
      - 'app/**'
      - 'core/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: build unsigned .ipa
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen (pinned) + ldid
        # Pin XcodeGen to a known-good release so a previously-green build can't
        # break from Homebrew drift (a newer XcodeGen could emit a project format
        # the runner's Xcode can't read). Bump deliberately, not implicitly.
        run: |
          set -euo pipefail
          XCODEGEN_VERSION=2.46.0
          curl -fsSL -o /tmp/xcodegen.zip \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          sudo /tmp/xcodegen/xcodegen/install.sh
          xcodegen --version
          brew install ldid

      - name: Select newest installed Xcode
        # XcodeGen emits the Xcode 16 project format (objectVersion 77); pick the
        # highest-versioned Xcode present so xcodebuild can read it.
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          xcodebuild -version

      - name: Generate Xcode project
        working-directory: app
        run: xcodegen generate

      - name: Build (unsigned, arm64/iphoneos)
        working-directory: app
        run: |
          set -euo pipefail
          xcodebuild \
            -project iOS3VM.xcodeproj \
            -target iOS3VM \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR="$PWD/dist" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Fake-sign + package .ipa
        working-directory: app
        run: |
          set -euo pipefail
          APP="dist/iOS3VM.app"
          test -d "$APP"
          # Embed entitlements and ad-hoc sign; the jailbreak's AMFI patch trusts this.
          ldid -S"iOS3VM.entitlements" "$APP/iOS3VM"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          zip -qry iOS3VM.ipa Payload
          ls -lh iOS3VM.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: iOS3VM-ipa
          path: app/iOS3VM.ipa
          if-no-files-found: error
