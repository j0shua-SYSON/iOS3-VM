name: core-tests

# The emulator core is portable C11 — it builds and unit-tests on any host,
# so we gate every push on it. Fast (seconds) and device-independent.
on:
  push:
    paths:
      - 'core/**'
      - 'tools/**'
      - 'app/Sources/VMGuest.c'
      - 'app/Sources/VMGuest.h'
      - 'app/Tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/core-tests.yml'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure

  jit:
    # The dynamic recompiler (docs/dynarec.md). It is off in the default build,
    # so it needs a job of its own or it would never be compiled at all.
    #
    # Two different things are being checked here, and the matrix reflects
    # that:
    #
    #   ubuntu-latest (x86_64) — the emitter and the block translator are pure
    #     computation, so their byte-exact tests run anywhere. The execution
    #     test detects a non-arm64 host and reports SKIP.
    #
    #   macos-14 / macos-15 (Apple Silicon, arm64) — the ONLY place emitted
    #     code is actually executed, which is the only way to show the
    #     encodings compute the right answers rather than merely being
    #     well-formed. The gate is at runtime, not in CMake: test_jit_exec asks
    #     whether the host can execute and obtain executable memory. The
    #     explicit verdict step rejects a macOS skip or plain-RWX fallback:
    #     losing MAP_JIT execution coverage is itself a CI failure.
    #
    # Ubuntu's expected x86 skip remains allowed and is checked exactly.
    name: jit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Report host architecture
        run: uname -m

      - name: Configure (JIT on)
        run: cmake -S . -B build-jit -DCMAKE_BUILD_TYPE=Release -DIOS3VM_JIT=ON

      - name: Build
        run: cmake --build build-jit --config Release

      - name: Test
        run: ctest --test-dir build-jit --output-on-failure

      - name: Verify the JIT memory and execution verdicts
        run: |
          set -euo pipefail
          set +e
          memory_output="$(./build-jit/core/test_jit_mem 2>&1)"
          memory_status=$?
          output="$(./build-jit/core/test_jit_exec 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$memory_output"
          printf '%s\n' "$output"
          test "$memory_status" -eq 0
          test "$status" -eq 0
          grep -Eq '[1-9][0-9]* passed, 0 failed' <<<"$memory_output"
          if [ "$RUNNER_OS" = "macOS" ]; then
            if grep -Fq 'SKIP:' <<<"$memory_output"; then
              echo 'Required macOS MAP_JIT memory-policy coverage was skipped.' >&2
              exit 1
            fi
            if grep -Fq 'SKIP:' <<<"$output"; then
              echo 'The required macOS arm64 JIT execution coverage was skipped.' >&2
              exit 1
            fi
            grep -Fq 'code buffer policy: MAP_JIT + pthread_jit_write_protect_np' <<<"$output"
            grep -Eq '[1-9][0-9]* passed, 0 failed' <<<"$output"
          else
            grep -Fq 'SKIP: not an arm64 host' <<<"$output"
          fi

      - name: Configure and build with the JIT off
        # The default build must stay green and unchanged; this is the guard
        # against the option leaking into it.
        run: |
          cmake -S . -B build-off -DCMAKE_BUILD_TYPE=Release
          cmake --build build-off --config Release
          ctest --test-dir build-off --output-on-failure

  sanitize:
    # The emulator parses untrusted, user-supplied firmware and executes guest
    # code that can address anything, so run the whole suite under the address
    # and undefined-behaviour sanitizers. These are unavailable on the Windows
    # dev machine, which makes this job the real safety net.
    name: asan + ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (sanitizers)
        run: |
          cmake -S . -B build-san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIOS3VM_JIT=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"

      - name: Build
        run: cmake --build build-san

      - name: Test
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          ASAN_OPTIONS: detect_leaks=1
        run: ctest --test-dir build-san --output-on-failure

  strict:
    # Every C target, including host tools and the app's portable bridge, must
    # remain warning-free.  Keep this hosted: the user's development machine is
    # intentionally reserved for tiny checks and may not have the same compiler.
    name: warnings as errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (strict warnings)
        run: |
          cmake -S . -B build-strict \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIOS3VM_JIT=ON \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"

      - name: Build
        run: cmake --build build-strict

      - name: Test
        run: ctest --test-dir build-strict --output-on-failure
