# XcodeGen spec for the iOS3-VM app.
#
# We do NOT commit an .xcodeproj (it is a churny binary blob). CI runs
# `xcodegen generate` on the macOS runner to produce iOS3VM.xcodeproj from
# this file, then `xcodebuild`. To develop locally on a Mac, run the same
# `xcodegen generate` and open the project.
name: iOS3VM
options:
  bundleIdPrefix: com.j0shua
  deploymentTarget:
    iOS: "13.0"
  createIntermediateGroups: true

targets:
  iOS3VM:
    type: application
    platform: iOS
    sources:
      - path: Sources
      # Compile the platform-independent emulator core straight into the app.
      - path: ../core/src
        name: core
        # The dynamic recompiler (docs/dynarec.md) is deliberately NOT in the
        # app yet. It is gated by the CMake option IOS3VM_JIT for host builds
        # and nothing in the machine's run loop calls it, so compiling it in
        # would add code to the shipping binary that cannot run. Delete this
        # exclusion at stage J3, when the app enables the JIT for real.
        excludes:
          - "jit/**"
    # Linked explicitly rather than relying on module auto-linking: the display
    # path calls into CoreGraphics (CGImageCreate) and QuartzCore (CALayer
    # filters) directly, and "it happened to link via UIKit" is not something to
    # discover on a CI runner.
    dependencies:
      - sdk: Foundation.framework
      - sdk: UIKit.framework
      - sdk: CoreGraphics.framework
      - sdk: QuartzCore.framework
    settings:
      base:
        PRODUCT_NAME: iOS3VM
        PRODUCT_BUNDLE_IDENTIFIER: com.j0shua.iOS3VM
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS3VM.entitlements
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../core/include
        GCC_C_LANGUAGE_STANDARD: c11
        # Stated rather than inherited: the Objective-C sources are written for
        # ARC, and would leak (or double-free) under manual retain/release.
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_ENABLE_MODULES: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: NO
        # Signing is handled after the build by ldid fake-signing (see CI).
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
